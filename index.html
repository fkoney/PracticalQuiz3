// ── Scene ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
// Rich deep-space blue background — no fog (fog hides outer planets)
scene.background = new THREE.Color(0x010a1a);

const W = window.innerWidth, H = window.innerHeight;
const camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 10000);
camera.position.set(0, 180, 420);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelCanvas = document.getElementById('label-canvas');
const lctx = labelCanvas.getContext('2d');
labelCanvas.width = W; labelCanvas.height = H;

// ── Lighting ───────────────────────────────────────────────────────────────
// Sun point light — strong, very large range so outer planets are lit
const sunLight = new THREE.PointLight(0xffffff, 2.5, 0); // distance=0 means no falloff
sunLight.position.set(0,0,0);
scene.add(sunLight);

// Bright white-blue ambient so ALL planets are clearly visible on dark side too
const ambient = new THREE.AmbientLight(0x334466, 2.2);
scene.add(ambient);

// Soft blue hemisphere light (sky=blue, ground=dark) — fills in planet dark sides beautifully
const hemi = new THREE.HemisphereLight(0x2255aa, 0x000511, 1.2);
scene.add(hemi);

// ── Textures ───────────────────────────────────────────────────────────────
const loader = new THREE.TextureLoader();
const T = {};
Object.keys(TEX_DATA).forEach(k => { T[k] = loader.load(TEX_DATA[k]); });

// ── Milky Way skybox with blue tint ───────────────────────────────────────
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(4000,32,32),
  new THREE.MeshBasicMaterial({ map:T.stars, side:THREE.BackSide, color:0x223366 })
));

// Nebula glow layers — deep blue atmosphere
[[3200,0x0011aa,0.14],[2400,0x001155,0.10],[1600,0x000833,0.08]].forEach(([r,c,o])=>{
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(r,16,16),
    new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,side:THREE.BackSide})));
});

// Coloured star points
const sGeo=new THREE.BufferGeometry();
const sPos=[],sCol=[];
const pal=[[1,1,1],[0.6,0.8,1],[1,0.95,0.7],[1,0.75,0.75],[0.7,0.9,1],[0.85,0.85,1]];
for(let i=0;i<5000;i++){
  const r=800+Math.random()*1200,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
  sPos.push(r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th));
  const c=pal[Math.floor(Math.random()*pal.length)]; sCol.push(...c);
}
sGeo.setAttribute('position',new THREE.Float32BufferAttribute(sPos,3));
sGeo.setAttribute('color',new THREE.Float32BufferAttribute(sCol,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({size:1.0,vertexColors:true})));

// ── Sun — STATIC, never rotates or moves ──────────────────────────────────
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(20,64,64),
  new THREE.MeshBasicMaterial({ map:T.sun })
);
scene.add(sun);
// Corona layers
// Sun glow — use a canvas sprite so there's no hard sphere edge/ring artifact
(function addSunGlow(){
  const cv=document.createElement('canvas'); cv.width=cv.height=256;
  const ctx=cv.getContext('2d');
  const grad=ctx.createRadialGradient(128,128,0,128,128,128);
  grad.addColorStop(0,'rgba(255,210,80,0.9)');
  grad.addColorStop(0.18,'rgba(255,140,20,0.6)');
  grad.addColorStop(0.4,'rgba(255,80,0,0.25)');
  grad.addColorStop(0.7,'rgba(255,40,0,0.08)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,256,256);
  const tex=new THREE.CanvasTexture(cv);
  const sprite=new THREE.Sprite(new THREE.SpriteMaterial({
    map:tex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
  }));
  sprite.scale.set(110,110,1);
  scene.add(sprite);
})();

// ── Planet Data ────────────────────────────────────────────────────────────
// Speeds are RELATIVE orbital periods scaled so the difference is clearly visible:
// Real periods (Earth years): Mercury=0.24, Venus=0.62, Earth=1.0, Mars=1.88,
//   Jupiter=11.86, Saturn=29.46, Uranus=84.01, Neptune=164.8
// We invert these so faster orbit = higher number, then scale up nicely.
// Base speed = 1/period * scale. Mercury should be clearly fastest, Neptune clearly slowest.
const PLANETS = [
  // name       r      orbit   speed(1/period*10)  tilt(rad)  texture
  { name:'Mercury', r:2.2,  orbit:32,  speed:0.410, tilt:0.03,  texKey:'mercury' },
  { name:'Venus',   r:5.2,  orbit:50,  speed:0.160, tilt:3.10,  texKey:'venus'   },
  { name:'Earth',   r:5.5,  orbit:68,  speed:0.100, tilt:0.41,  texKey:'earth'   },
  { name:'Mars',    r:3.5,  orbit:90,  speed:0.053, tilt:0.44,  texKey:'mars'    },
  { name:'Jupiter', r:14.0, orbit:126, speed:0.0084,tilt:0.05,  texKey:'jupiter' },
  { name:'Saturn',  r:11.5, orbit:166, speed:0.0034,tilt:0.47,  texKey:'saturn'  },
  { name:'Uranus',  r:8.0,  orbit:205, speed:0.0035,tilt:1.71,  texKey:'uranus'  },
  { name:'Neptune', r:7.5,  orbit:244, speed:0.0020,tilt:0.49,  texKey:'neptune' },
];

// Global speed multiplier to make all planets comfortably visible
// Each planet's pivot.rotation.y += dt * p.speed * GLOBAL_MULT
// We want Mercury noticeably fast, Neptune clearly slow but still moving
const GLOBAL_MULT = 18.0;

const orbitColors=[0xbbbbbb,0xddaa55,0x44aaff,0xff6644,0xddbb66,0xeedd88,0x55eeff,0x5577ff];

// ── Orbit rings ────────────────────────────────────────────────────────────
PLANETS.forEach((p,i)=>{
  const pts=[];
  for(let k=0;k<=256;k++){
    const a=(k/256)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*p.orbit,0,Math.sin(a)*p.orbit));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:orbitColors[i],transparent:true,opacity:0.5})
  ));
});

// ── Create planets ─────────────────────────────────────────────────────────
const planetMeshes=[];
PLANETS.forEach((p,i)=>{
  const pivot=new THREE.Object3D();
  scene.add(pivot);

  // MeshStandardMaterial — better PBR response, planets look great with it
  const mat = new THREE.MeshStandardMaterial({
    map: T[p.texKey],
    roughness: 0.75,
    metalness: 0.0,
  });
  // Special material tweaks per planet
  if(p.name==='Earth')  { mat.roughness=0.6; }
  if(p.name==='Jupiter'){ mat.roughness=0.85; }
  if(p.name==='Saturn') { mat.roughness=0.85; }

  const mesh=new THREE.Mesh(new THREE.SphereGeometry(p.r,64,64), mat);
  mesh.rotation.z=p.tilt;
  mesh.position.x=p.orbit;
  pivot.add(mesh);

  // Venus: surface + atmosphere glow overlay
  if(p.name==='Venus'){
    mesh.add(new THREE.Mesh(
      new THREE.SphereGeometry(p.r*1.04,32,32),
      new THREE.MeshStandardMaterial({
        map:T.venus_atm, transparent:true, opacity:0.55,
        roughness:1.0, metalness:0.0,
        side:THREE.FrontSide, depthWrite:false
      })
    ));
  }

  // Saturn rings — real alpha texture from zip
  if(p.name==='Saturn'){
    const ri=p.r*1.35, ro=p.r*2.6;
    const rGeo=new THREE.RingGeometry(ri,ro,128);
    const rPos=rGeo.attributes.position, rUv=rGeo.attributes.uv;
    for(let j=0;j<rPos.count;j++){
      const vx=rPos.getX(j),vz=rPos.getZ(j),d=Math.sqrt(vx*vx+vz*vz);
      rUv.setXY(j,(d-ri)/(ro-ri),0.5);
    }
    rUv.needsUpdate=true;
    const ring=new THREE.Mesh(rGeo,new THREE.MeshBasicMaterial({
      map:T.saturn_ring, alphaMap:T.saturn_ring,
      side:THREE.DoubleSide, transparent:true, opacity:0.95, depthWrite:false
    }));
    ring.rotation.x=Math.PI/2.2;
    mesh.add(ring);
  }

  // Earth's Moon
  if(p.name==='Earth'){
    const mp=new THREE.Object3D();
    const moon=new THREE.Mesh(
      new THREE.SphereGeometry(1.4,32,32),
      new THREE.MeshStandardMaterial({map:T.moon,roughness:0.95})
    );
    moon.position.x=9.5;
    mp.add(moon); mesh.add(mp);
    mesh.userData.moonPivot=mp;
  }

  pivot.rotation.y=(i/PLANETS.length)*Math.PI*2;
  planetMeshes.push({pivot,mesh,data:p});
});

// ── Camera orbit controls ──────────────────────────────────────────────────
let isDragging=false,prevX=0,prevY=0,azimuth=0,elevation=0.38,distance=490;
function updateCamera(){
  camera.position.set(
    distance*Math.sin(azimuth)*Math.cos(elevation),
    distance*Math.sin(elevation),
    distance*Math.cos(azimuth)*Math.cos(elevation)
  );
  camera.lookAt(0,0,0);
}
updateCamera();
renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevX=e.clientX;prevY=e.clientY;});
window.addEventListener('mouseup',()=>isDragging=false);
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  azimuth-=(e.clientX-prevX)*0.005;
  elevation=Math.max(-1.4,Math.min(1.4,elevation+(e.clientY-prevY)*0.005));
  prevX=e.clientX;prevY=e.clientY;updateCamera();
});
renderer.domElement.addEventListener('wheel',e=>{
  distance=Math.max(40,Math.min(900,distance+e.deltaY*0.35));updateCamera();
},{passive:true});
renderer.domElement.addEventListener('touchstart',e=>{isDragging=true;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>isDragging=false);
window.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  azimuth-=(e.touches[0].clientX-prevX)*0.005;
  elevation=Math.max(-1.4,Math.min(1.4,elevation+(e.touches[0].clientY-prevY)*0.005));
  prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;updateCamera();
},{passive:true});

// ── Speed controls ─────────────────────────────────────────────────────────
let speedMult=1.0,paused=false;

// ── Labels ─────────────────────────────────────────────────────────────────
const labelColors={
  Mercury:'#d8d8d8', Venus:'#f5d870',  Earth:'#55ccff', Mars:'#ff7755',
  Jupiter:'#e8bb77', Saturn:'#eedd99', Uranus:'#66eeff', Neptune:'#6699ff'
};
const tmp=new THREE.Vector3();
function drawLabels(){
  lctx.clearRect(0,0,labelCanvas.width,labelCanvas.height);
  lctx.font='bold 13px Courier New'; lctx.textAlign='center';
  planetMeshes.forEach(({mesh,data})=>{
    mesh.getWorldPosition(tmp); tmp.project(camera);
    const sx=(tmp.x*0.5+0.5)*labelCanvas.width;
    const sy=(-tmp.y*0.5+0.5)*labelCanvas.height;
    if(tmp.z<1){
      const yOff=sy-data.r*1.5-7;
      lctx.fillStyle='rgba(0,0,0,0.7)'; lctx.fillText(data.name,sx+1,yOff+1);
      lctx.fillStyle=labelColors[data.name]||'#fff'; lctx.fillText(data.name,sx,yOff);
    }
  });
  tmp.set(0,0,0).project(camera);
  const sx=(tmp.x*0.5+0.5)*labelCanvas.width, sy=(-tmp.y*0.5+0.5)*labelCanvas.height;
  lctx.fillStyle='rgba(0,0,0,0.6)'; lctx.fillText('SUN',sx+1,sy-27);
  lctx.fillStyle='#ffcc44'; lctx.fillText('SUN',sx,sy-27);
}

// ── Comets ─────────────────────────────────────────────────────────────────
const comets = [];
(function createComets(){
  const COMET_DEFS = [
    { a:340, b:140, tilt:0.38, speed:0.55, offset:0.0,  incline: 0.32 },
    { a:290, b:100, tilt:2.10, speed:0.72, offset:2.1,  incline:-0.22 },
  ];

  COMET_DEFS.forEach(def => {
    // Glowing head — canvas sprite
    const hcv = document.createElement('canvas'); hcv.width = hcv.height = 64;
    const hctx = hcv.getContext('2d');
    const hg = hctx.createRadialGradient(32,32,0,32,32,32);
    hg.addColorStop(0,'rgba(255,255,255,1)');
    hg.addColorStop(0.15,'rgba(180,220,255,0.9)');
    hg.addColorStop(0.4,'rgba(100,160,255,0.4)');
    hg.addColorStop(1,'rgba(0,0,0,0)');
    hctx.fillStyle=hg; hctx.fillRect(0,0,64,64);
    const headSprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(hcv),
      transparent:true, blending:THREE.AdditiveBlending, depthWrite:false
    }));
    headSprite.scale.set(6,6,1);
    scene.add(headSprite);

    // Tail — line of points fading from head
    const TAIL_POINTS = 60;
    const tailPositions = new Float32Array(TAIL_POINTS * 3);
    const tailColors    = new Float32Array(TAIL_POINTS * 3);
    const tailGeo = new THREE.BufferGeometry();
    tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPositions, 3));
    tailGeo.setAttribute('color',    new THREE.BufferAttribute(tailColors, 3));
    const tailMat = new THREE.LineBasicMaterial({
      vertexColors:true, transparent:true, blending:THREE.AdditiveBlending,
      depthWrite:false, opacity:1.0
    });
    scene.add(new THREE.Line(tailGeo, tailMat));

    comets.push({ ...def, angle: def.offset, headSprite, tailGeo, tailPositions, tailColors, TAIL_POINTS });
  });
})();

function updateComets(dt){
  comets.forEach(c => {
    c.angle += dt * c.speed;

    // Elliptical position
    const x = c.a * Math.cos(c.angle);
    const z = c.b * Math.sin(c.angle);

    // Apply tilt (rotation around Y) and incline (rotation around X)
    const cosT=Math.cos(c.tilt), sinT=Math.sin(c.tilt);
    const cosI=Math.cos(c.incline), sinI=Math.sin(c.incline);
    const rx = x*cosT - z*sinT;
    const rz = x*sinT + z*cosT;
    const ry = rz*sinI;
    const fz = rz*cosI;

    c.headSprite.position.set(rx, ry, fz);

    // Tail — shift old positions back, insert new head at front
    // Direction of travel (velocity approx)
    const vx = -c.a * Math.sin(c.angle);
    const vz_raw =  c.b * Math.cos(c.angle);
    const tvx = vx*cosT - vz_raw*sinT;
    const tvz = vx*sinT + vz_raw*cosT;
    const tvy = tvz*sinI;
    const tfz = tvz*cosI;
    const vLen = Math.sqrt(tvx*tvx+tvy*tvy+tfz*tfz)||1;
    // tail points stream opposite to velocity
    const tailStep = 3.5;
    for(let i=0;i<c.TAIL_POINTS;i++){
      const t = i / (c.TAIL_POINTS-1);
      const fade = 1.0 - t;
      c.tailPositions[i*3+0] = rx - (tvx/vLen)*i*tailStep*0.12;
      c.tailPositions[i*3+1] = ry - (tvy/vLen)*i*tailStep*0.12;
      c.tailPositions[i*3+2] = fz - (tfz/vLen)*i*tailStep*0.12;
      // colour: white-blue fading to transparent
      c.tailColors[i*3+0] = 0.7 + 0.3*fade;
      c.tailColors[i*3+1] = 0.8 + 0.2*fade;
      c.tailColors[i*3+2] = 1.0;
      // fade alpha encoded in blue channel won't work directly — use colour brightness
      const br = fade * fade;
      c.tailColors[i*3+0] *= br;
      c.tailColors[i*3+1] *= br;
      c.tailColors[i*3+2] *= br;
    }
    c.tailGeo.attributes.position.needsUpdate = true;
    c.tailGeo.attributes.color.needsUpdate    = true;
  });
}


const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = paused ? 0 : clock.getDelta() * speedMult;

  // Sun stays perfectly still
  // Each planet orbits at its own real-ratio speed — Mercury visibly fastest
  planetMeshes.forEach(({pivot,mesh,data})=>{
    pivot.rotation.y += dt * data.speed * GLOBAL_MULT;   // orbit (different per planet)
    mesh.rotation.y  += dt * 0.3;                        // gentle self-spin
    if(mesh.userData.moonPivot) mesh.userData.moonPivot.rotation.y += dt * 2.0;
  });

  updateComets(dt);

  renderer.render(scene,camera);
  drawLabels();
}
animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  labelCanvas.width=w; labelCanvas.height=h;
});
</script>
</body>
